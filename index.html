<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img class="plant" src="/img/plant.jpg" alt="">
            <div class="transparent">
                <img src="/img/Odin-logo.png" alt="">
            </div>
            <h5>Credit</h5>
        </div>
        <div class="page">
            <div class="Text">
                <h1>This is not a real online service! You know you need something like this in your life to help you realize</h1>
                <h1>You know you want to.</h1>
            </div>
            <div class="form">
                <form action="" method="POST">
                    <fieldset>
                    <legend>Let's do this!</legend>                    
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email">
                        <label for="pn" >PHONE NUMBER</label>
                        <input type="\d{3}[-]?\d{3}[-]?\d{4}" id="pn">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password">
                        <label for="cpassword">CONFIRM PASSWORD</label>
                        <input type="password" id="cpassword">
                    </fieldset>

                    <button type="submit">Create Account</button>

                </form>
                <h3>Already have an account? <span>Log in</span></h3>
            </div>
        </div>
    </div>    
</body>
</html>
