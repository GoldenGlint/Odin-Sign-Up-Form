<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up From</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato&display=swap" rel="stylesheet">

</head>
<body>
    <div class="container">
        <div class="sidebar">
             <h5 class="credit">Photo by Halie West on Unsplash</h5>
            <img class="plant" src="/img/plant.jpg" alt="">
            <div class="transparent">             
            </div>
            
            <div class="logo">
                <img class="odin-logo" src="/img/Odin-logo.png" alt="">
                <h1 class="odin-text">ODIN</h1>
            </div>
            
            
           
        </div>
        <div class="page">
            <div class="text">
                <h1>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.<br><br>You <i>know</i> you want to.</h1>
                
            </div>
            <div class="form">
                <form action="https://httpbin.org/post" method="POST">
                    <fieldset>
                    <legend>Let's do this!</legend>
                        <div class="question">
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name" placeholder="LeBron" name="first-name" required>
                        </div>                    
                        
                        <div class="question">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name" placeholder="James" name="last-name" required>
                        </div>

                        <div class="question">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" placeholder="bob123@gmail.com" name="email" required>
                        </div>

                        <div class="question">
                        <label for="pn" >PHONE NUMBER</label>
                        <input type="text" pattern="[0-9]{3}-?[0-9]{3}-?[0-9]{4}" id="pn" placeholder="123(-)456(-)7890" name="pn" required>
                        </div>

                        <div class="question">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" placeholder="Add Password" name="password" required>
                        </div>

                        <div class="question">
                        <label for="cpassword">CONFIRM PASSWORD</label>
                        <input type="password" id="cpassword" placeholder="Confirm Password" name="confirm-password" required>
                        </div>
                    </fieldset>
                    <div class="footer">
                        <button type="submit">Create Account</button>
                        <h3>Already have an account? <span class=green>Log in</span></h3>
                    </div>
                    

                </form>
                
            </div>
        </div>
    </div>    
</body>
</html>
